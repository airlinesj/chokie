# Netlify Configuration for Angular Application

[build]
  command = "npm ci && npm run build"
  publish = "dist/chokie-birthday"

[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html for Angular routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for optimization
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
